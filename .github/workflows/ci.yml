name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read
  id-token: write

jobs:
  tests:
    runs-on: ubuntu-latest
    environment: CI
    services:
      cosmwasm-etl-db:
        image: postgres
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: appPW
          POSTGRES_DB: cosmwasm_etl
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'

    - name: Run Golang linter
      uses: golangci/golangci-lint-action@v8
    
    - name: Build all
      run: make build-all

    - name: Tests
      shell: bash
      run: |
        echo "${{ secrets.CONFIG }}" > config.yaml
        go test -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.out
    
    - name: Migration Tests
      run: |
        make parser-migrate-up
        make parser-migrate-test
        make parser-migrate-down

  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get changed files
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'go.mod'
              - 'go.sum'

      - name: Validate Dockerfile (syntax check)
        run: docker build --check --build-arg APP_PATH=parser/dex .

      - name: Full build check (Dockerfile/go.mod changed)
        if: steps.changed.outputs.docker == 'true'
        env:
          APP_PATH: parser/dex
        run: make image
